name: Monthly GitHub Pages Screenshots

on:
  schedule:
    - cron: "30 7 1 * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force recapture for all eligible repositories"
        required: false
        default: "false"
      bootstrap:
        description: "Capture ALL eligible repos with no cap (use for first run)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        env:
          MAX_SCREENSHOTS: ${{ github.event.inputs.bootstrap == 'true' && '0' || '40' }}
          FORCE_SCREENSHOT_REFRESH: ${{ (github.event.inputs.force_refresh == 'true' || github.event.inputs.bootstrap == 'true') && 'true' || 'false' }}
        run: npm run screenshot:pages

      - name: Rebuild site data
        run: npm run build:data

      - name: Validate generated data and curation
        run: |
          npm run validate:data
          npm run validate:curation

      - name: Commit updates
        run: |
          screenshots_changed=false
          if ! git diff --quiet -- data/generated/screenshots.json src/assets/screenshots; then
            screenshots_changed=true
          fi

          if [[ "$screenshots_changed" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/assets/screenshots data/generated/screenshots.json data/site-data.json
            git commit -m "chore: ${{ github.event.inputs.bootstrap == 'true' && 'bootstrap' || 'monthly' }} screenshot refresh"
            git push
          else
            echo "No meaningful screenshot changes to commit"
          fi
