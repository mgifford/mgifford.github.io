name: Weekly Repository Sync

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync repositories
        env:
          GH_OWNER: mgifford
          GH_TOKEN: ${{ secrets.MGIFFORD_TOKEN || secrets.GITHUB_TOKEN }}
          README_SCAN_LIMIT: "400"
        run: npm run sync:all

      - name: Install browser dependencies (changed/new screenshots)
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots for changed or new repos
        env:
          MAX_SCREENSHOTS: "20"
        run: npm run screenshot:pages

      - name: Rebuild site data after screenshots
        run: npm run build:data

      - name: Commit updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/generated data/site-data.json reports/changes-latest.md src/assets/screenshots
            git commit -m "chore: weekly repo sync"
            git push
          else
            echo "No changes to commit"
          fi
